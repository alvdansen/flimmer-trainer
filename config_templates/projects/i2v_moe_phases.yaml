# ══════════════════════════════════════════════════════════════════════
# Flimmer Project Config — Multi-Phase MoE Workflow
# ══════════════════════════════════════════════════════════════════════
#
# A project YAML defines a multi-phase training workflow that is
# executed sequentially by `python -m flimmer.project run`.
#
# This example shows the recommended fork-and-specialize workflow
# for Wan 2.2 I2V MoE training:
#
#   Phase 1: Unified Warmup
#     Both noise experts train together with shared LoRA weights.
#     Builds a foundation that captures the subject/style.
#
#   Phase 2: High-Noise Expert Fork
#     Separate LoRA for the high-noise expert (composition, motion).
#     Higher learning rate, fewer epochs — coarse features converge fast.
#
#   Phase 3: Low-Noise Expert Fork
#     Separate LoRA for the low-noise expert (detail, texture).
#     Lower learning rate, more epochs — fine details need patience.
#
# The project system tracks phase status (PENDING -> RUNNING -> COMPLETED)
# in flimmer_project.json. Re-running the project skips completed phases
# and picks up where it left off.
#
# How it works:
#   - base_config points to a full flimmer_train.yaml with model paths,
#     data config, save settings, lora config, etc.
#   - run_level_params are locked for the entire project (changing them
#     mid-project would invalidate earlier phases)
#   - Each phase only overrides phase-variable parameters (learning_rate,
#     max_epochs, etc.) — everything else comes from base_config
#
# Usage:
#   python -m flimmer.project run --project config_templates/projects/i2v_moe_phases.yaml
#   python -m flimmer.project status --project config_templates/projects/i2v_moe_phases.yaml
#
# ══════════════════════════════════════════════════════════════════════


# ── Project Identity ────────────────────────────────────────────────

name: my_i2v_project
model_id: wan-2.2-i2v-14b


# ── Base Training Config ────────────────────────────────────────────
# This must be a full flimmer_train.yaml with model paths, data_config,
# lora structure, optimizer, save settings, etc. All phases inherit
# from this config and only override specific parameters.

base_config: ./flimmer_train.yaml


# ── Run-Level Params (locked for entire project) ───────────────────
# These cannot change between phases. Changing LoRA rank or precision
# mid-project would invalidate the checkpoint chain.

run_level_params:
  lora_rank: 16                            # I2V max safe rank at 720p/81 frames on 80GB GPUs.
  lora_alpha: 16                           # Rank 32 OOMs at 720p — reduce resolution or frames first.
  mixed_precision: bf16
  base_model_precision: fp8                # Required for I2V at 720p. See docs/I2V_GUIDE.md#vram-requirements.


# ── Phases (execute in order) ──────────────────────────────────────
# Each phase overrides only the parameters that change.
# Status is tracked in flimmer_project.json — completed phases are
# skipped on re-run.
#
# To add a new phase:   Append to this list, then re-run the project.
# To modify a phase:    Only PENDING phases can be modified.
# To check progress:    python -m flimmer.project status --project <this-file>

phases:

  # Phase 1: Both experts train together with shared LoRA weights.
  # This builds a general foundation before specializing.
  - type: full_noise
    name: "Unified Warmup"
    overrides:
      learning_rate: 5e-5
      max_epochs: 15

  # Phase 2: High-noise expert gets its own LoRA copy.
  # Handles composition, motion, and coarse structure.
  - type: high_noise
    name: "High Noise Expert"
    overrides:
      max_epochs: 30
    extras:
      boundary_ratio: 0.900                      # I2V noise boundary

  # Phase 3: Low-noise expert gets its own LoRA copy.
  # Handles fine detail, texture, and sharpness.
  - type: low_noise
    name: "Low Noise Expert"
    overrides:
      max_epochs: 50
    extras:
      boundary_ratio: 0.900                      # I2V noise boundary
